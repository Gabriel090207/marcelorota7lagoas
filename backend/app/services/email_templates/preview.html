<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Email Preview</title>
</head>
<body style="
  margin: 0;
  padding: 0;
  background-color: #0f0f0f;
  font-family: Arial, sans-serif;
  color: #ffffff;
">

  <table width="100%" cellpadding="0" cellspacing="0" style="padding: 20px;">
    <tr>
      <td align="center">
        
        <!-- CONTAINER -->
        <table width="600" cellpadding="0" cellspacing="0" style="
          background-color: #1a1a1a;
          border-radius: 12px;
          overflow: hidden;
          border: 1px solid #2a2a2a;
        ">

          <!-- HEADER -->
          <tr>
            <td style="
              padding: 20px;
              text-align: center;
              background-color: #0f0f0f;
              border-bottom: 1px solid #2a2a2a;
            ">

              <!-- LOGO -->
              <img 
                src="https://www.rota7lagoas.com.br/images/logo.png"
                alt="Portal 7 Lagoas"
                style="
                  height: 50px;
                  margin-bottom: 10px;
                "
              />

              <h1 style="
                margin: 0;
                color: #ff7a00;
                font-size: 20px;
              ">
                Portal 7 Lagoas
              </h1>

            </td>
          </tr>

          <!-- CONTENT -->
          <tr>
            <td style="padding: 20px;">

              <!-- TÍTULO -->
              <h2 style="
                margin-bottom: 10px;
                text-align: center;
                font-size: 22px;
              ">
                🚨 Nova Notícia em Destaque
              </h2>

              <!-- TEXTO PRINCIPAL -->
              <p style="
                color: #cccccc;
                line-height: 1.6;
                text-align: center;
                max-width: 480px;
                margin: 0 auto;
              ">
                Uma nova notícia acabou de ser publicada e já está dando o que falar!  
                Veja os principais detalhes e descubra o que está acontecendo agora na região...
              </p>

              <!-- PREVIEW / CURIOSIDADE -->
              <p style="
                color: #aaaaaa;
                margin-top: 15px;
                text-align: center;
                font-style: italic;
              ">
                Continue lendo para descobrir todos os detalhes 👇
              </p>

              <!-- BOTÃO -->
              <div style="text-align: center;">
                <a href="#" style="
                  display: inline-block;
                  margin-top: 20px;
                  padding: 14px 24px;
                  background-color: #ff7a00;
                  color: #000;
                  text-decoration: none;
                  border-radius: 8px;
                  font-weight: bold;
                ">
                  Ler notícia completa
                </a>
              </div>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="
              padding: 15px;
              text-align: center;
              font-size: 12px;
              color: #777;
              border-top: 1px solid #2a2a2a;
            ">
              © Portal 7 Lagoas
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
